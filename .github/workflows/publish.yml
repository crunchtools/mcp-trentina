name: Publish to PyPI + RPM

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish-pypi:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for trusted publishing

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  build-rpm:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for uploading release assets

    steps:
      - uses: actions/checkout@v4

      - name: Install rpm-build
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Build cockpit-airlock RPM
        run: make rpm

      - name: Verify RPM
        run: rpm -qip dist/noarch/cockpit-airlock-*.noarch.rpm

      - name: Upload RPM to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dist/noarch/cockpit-airlock-*.noarch.rpm

      - name: Upload RPM as artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: cockpit-airlock-rpm
          path: dist/noarch/cockpit-airlock-*.noarch.rpm
