name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run linter
        run: uv run ruff check src tests

      - name: Run type checker
        run: uv run mypy src

      - name: Run tests
        run: uv run pytest -v
        env:
          GEMINI_API_KEY: "test_key_for_ci"

  gourmand:
    name: Code Quality (Gourmand)
    runs-on: ubuntu-latest
    container:
      image: quay.io/crunchtools/gourmand:latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Gourmand
        run: gourmand --full .

  build-container:
    runs-on: ubuntu-latest
    env:
      HAS_GEMINI_KEY: ${{ secrets.GEMINI_API_KEY != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Build container image
        run: |
          docker build -f Containerfile --build-arg HF_TOKEN=${{ secrets.HF_TOKEN }} -t mcp-airlock:test .

      - name: Verify container starts
        run: |
          timeout 5 docker run --rm mcp-airlock:test || true

      - name: Build test runner image (adds shell + pytest to distroless)
        run: |
          docker build -f - -t mcp-airlock:test-runner . <<'EOF'
          FROM quay.io/hummingbird/python:latest-builder AS test-deps
          USER 0
          RUN pip install --no-cache-dir --prefix=/usr pytest pytest-asyncio

          FROM mcp-airlock:test
          COPY --from=test-deps /usr/lib/python3.14/site-packages/ /usr/lib/python3.14/site-packages/
          EOF

      - name: Run L2 integration tests in container
        run: |
          docker run --rm \
            --entrypoint python \
            -v ${{ github.workspace }}/tests:/tests:ro \
            -e GEMINI_API_KEY="test_key_for_ci" \
            -e CLASSIFIER_MODEL_PATH="/models/prompt-guard-2-22m" \
            mcp-airlock:test-runner \
            -m pytest /tests/test_l2_integration.py -v

      - name: Run L3 integration tests in container
        if: env.HAS_GEMINI_KEY == 'true'
        run: |
          docker run --rm \
            --entrypoint python \
            -v ${{ github.workspace }}/tests:/tests:ro \
            -e GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            -e CLASSIFIER_MODEL_PATH="/models/prompt-guard-2-22m" \
            mcp-airlock:test-runner \
            -m pytest /tests/test_l3_integration.py -v

  validate-constitution:
    name: Constitution Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: crunchtools/constitution
          path: .constitution

      - name: Validate constitution
        run: python3 .constitution/validate-constitution.py .specify/memory/constitution.md --verbose
